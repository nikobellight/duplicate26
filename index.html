    --red-soft:#FDE9E8;
    --blue:#1C75BC;

  #app{min-height:100vh;display:flex;flex-direction:column;}
  .topbar{
    background:var(--paper);border-bottom:3px solid var(--red);
    display:flex;align-items:center;justify-content:space-between;padding:14px 24px;gap:14px;flex-wrap:wrap;
    position:sticky;top:0;z-index:50;
  }
  .wordmark{display:flex;align-items:center;gap:10px;}
  .wordmark h1{font-size:21px;color:var(--ink);}
  .tag{background:var(--yellow);color:var(--ink);font-family:'Poppins',sans-serif;font-weight:900;font-size:12px;padding:4px 9px;border-radius:4px;transform:rotate(-4deg);display:inline-block;box-shadow:0 2px 0 rgba(0,0,0,0.08);}
  nav.tabs{display:flex;gap:4px;flex-wrap:wrap;}
  nav.tabs button{background:transparent;border:none;border-bottom:3px solid transparent;color:var(--mist);padding:8px 12px 7px;font-size:13.5px;font-weight:600;}
  nav.tabs button:hover{color:var(--ink);}
  nav.tabs button.active{color:var(--red);border-color:var(--red);}
  .who{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--mist);}
  .who .pct{color:var(--blue);font-family:'JetBrains Mono',monospace;font-weight:700;}
  .who button{background:none;border:1px solid var(--line-strong);color:var(--mist);padding:6px 12px;border-radius:6px;font-size:12px;}
  .who button:hover{color:var(--ink);border-color:var(--mist);}

  .center-screen{min-height:80vh;display:flex;align-items:center;justify-content:center;padding:20px;}

  /* ---------- auth card ---------- */
  .card{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:32px;max-width:420px;width:100%;
    box-shadow:0 1px 3px rgba(20,23,28,0.06),0 10px 30px rgba(20,23,28,0.06);text-align:center;}
  .card h2{font-size:23px;margin:4px 0 6px;color:var(--ink);}
  .card p.sub{color:var(--mist);font-size:14px;margin:0 0 22px;line-height:1.55;text-align:left;}
  label{display:block;font-size:11.5px;text-transform:uppercase;letter-spacing:0.05em;color:var(--mist);margin-bottom:6px;font-weight:700;text-align:left;}
  .field{margin-bottom:16px;text-align:left;}
  input[type=text],input[type=email],textarea{width:100%;background:var(--paper);border:1.5px solid var(--line-strong);border-radius:8px;padding:11px 12px;color:var(--ink);font-size:14px;}
  input[type=text]:focus,input[type=email]:focus,textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-soft);}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--red);color:#fff;border:none;border-radius:8px;padding:12px 18px;font-weight:700;font-size:14px;transition:filter .15s ease;}
  .btn:hover{filter:brightness(1.08);}
  .btn.full{width:100%;}
  .btn:disabled{opacity:0.5;cursor:default;}
  .msg{font-size:13px;margin-top:14px;padding:10px 12px;border-radius:8px;line-height:1.45;text-align:left;}
  .msg.ok{background:#E9F8EF;color:#1E8A4C;border:1px solid #BFE9CF;}
  .msg.err{background:var(--red-soft);color:var(--red);border:1px solid #F6C7C3;}

  .badge26{width:110px;height:110px;margin:0 auto 16px;}
  .badge26.lg{width:150px;height:150px;}

  /* ---------- panels ---------- */
  .panel{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:24px;margin-bottom:20px;}
  .panel h2{font-size:20px;margin-bottom:4px;}
  .panel p.lead{color:var(--mist);font-size:13.5px;margin:0 0 18px;line-height:1.5;}
  .stat-row{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:18px;}
  .stat{background:var(--paper-soft);border:1px solid var(--line);border-radius:10px;padding:14px 18px;min-width:110px;flex:1;}
  .stat .num{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;color:var(--blue);}
  .stat .lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:0.05em;color:var(--mist);margin-top:2px;}

  .example{font-size:12px;color:var(--mist-soft);margin-top:8px;line-height:1.5;}

  .parallel-dot.tag-normal{background:#fff;}
  .parallel-dot.tag-blue{background:var(--blue);}
  .parallel-dot.tag-red{background:var(--red);}
  .parallel-dot.tag-purple{background:#8E44AD;}
  .parallel-dot.tag-green{background:var(--green);}
  .parallel-dot.tag-black{background:#1A1A1A;}

  .trade-header-cols{display:grid;grid-template-columns:140px 1fr 1fr;gap:10px;font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:var(--mist);padding:0 4px;margin-bottom:6px;}
  .trade-team-row{display:grid;grid-template-columns:140px 1fr 1fr;gap:10px;padding:10px 4px;border-bottom:1px solid var(--line);align-items:start;}
  .trade-team-row:last-child{border-bottom:none;}
  .trade-team-label{display:flex;align-items:center;gap:8px;font-weight:600;font-size:13px;}
  .empty-note{color:var(--mist-soft);font-size:13px;font-style:italic;}
  .contact-line{margin-top:14px;font-size:13px;color:var(--mist);}

  /* ---------- search ---------- */
  .search-result-row{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border:1px solid var(--line);border-radius:8px;margin-bottom:8px;}
  .search-result-row .count{font-family:'JetBrains Mono',monospace;color:var(--blue);font-size:13px;}

  /* ---------- members ---------- */
  .members-table{width:100%;border-collapse:collapse;font-size:14px;}
  .members-table th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:var(--mist);padding:8px 10px;border-bottom:1.5px solid var(--line-strong);}
  .members-table td{padding:10px;border-bottom:1px solid var(--line);}

  .loading{display:flex;align-items:center;justify-content:center;padding:60px 0;color:var(--mist);font-size:14px;}
  .footer-note{text-align:center;color:var(--mist-soft);font-size:12px;padding:20px;}
  .help-box{background:var(--blue-soft);border:1.5px solid var(--blue);border-radius:10px;padding:16px 18px;margin-bottom:20px;}
  .help-box h3{font-size:15px;color:var(--blue-deep);margin:0 0 10px;font-family:'Poppins',sans-serif;font-weight:800;}
  .help-box ol,.help-box ul{margin:0;padding-left:20px;color:var(--ink);font-size:14px;line-height:2;}
  .help-box li strong{color:var(--blue-deep);}
  .help-box .help-toggle{background:none;border:none;color:var(--blue-deep);font-weight:700;font-size:13px;cursor:pointer;padding:0;text-decoration:underline;}
  .help-body{margin-top:10px;}

  @media (max-width:768px){
    .detail .cols{grid-template-columns:1fr;}
    .topbar{flex-direction:column;align-items:flex-start;}
    .member-row{flex-wrap:wrap;gap:8px;}
    .member-row > div:first-child{flex:1;min-width:0;}
    .member-row > div:last-child{flex-shrink:0;}
    .sticker-chips{gap:6px;}
    .sticker{font-size:11px;padding:6px 8px;}
    nav.tabs{gap:2px;}
    nav.tabs button{font-size:12px;padding:6px 8px 5px;}
    .trade-header-cols{grid-template-columns:80px 1fr 1fr;}
    .trade-team-label{font-size:11px;}
    .trade-board-grid{grid-template-columns:1fr !important;}
  }
  .indicator-symbol{font-size:14px;line-height:1;}
</style>
</head>

/* ============================================================ MASTER LIST (994) ============================================================ */
const TEAMS = ['MEX','RSA','KOR','CZE','CAN','BIH','QAT','SUI','BRA','MAR','HAI','SCO','USA','PAR','AUS','TUR','GER','CUW','CIV','ECU','NED','JPN','SWE','TUN','BEL','EGY','IRN','NZL','ESP','CPV','KSA','URU','FRA','SEN','IRQ','NOR','ARG','ALG','AUT','JOR','POR','COD','UZB','COL','ENG','CRO','GHA','PAN'];

const TEAM_INFO = {
  MEX:['Mexico','mx'], RSA:['South Africa','za'], KOR:['South Korea','kr'], CZE:['Czechia','cz'],

};

function teamLabel(code){

  if (flag) return `<img class="flag-ico" src="https://flagcdn.com/${flag}.svg" width="22" height="16" alt="">`;

function buildMasterList(){
  const list = [];
  for (const t of TEAMS){
    for (let n=1;n<=20;n++){
      list.push({code:`${t}${n}`, team:t, number:n, category: n<=2?'badge': n===13?'photo':'player'});

  }
  list.push({code:'FWC00', team:'FWC', number:0, category:'special'});
  for (let n=1;n<=19;n++){
    list.push({code:`FWC${n}`, team:'FWC', number:n, category: n<=8?'special':'museum'});
  }
  for (let n=1;n<=14;n++){
    list.push({code:`CC${n}`, team:'CC', number:n, category:'promo'});
  }
  return list;
}
const MASTER = buildMasterList();
const MASTER_BY_CODE = new Map(MASTER.map(s=>[s.code,s]));
const GROUPS = ['FWC','CC',...TEAMS];

/* ============================================================ PARSER ============================================================ */
function parseExport(text, forceContext){
  const lines = text.split('\n');
  let context = forceContext || 'missing';
  const missing = new Set();
  const duplicates = {};
  const unmatched = [];
  for (let raw of lines){
    const line = raw.trim();
    if (!line) continue;
    const lower = line.toLowerCase();
    if (!forceContext && lower.includes('duplicate')) { context = 'duplicate'; continue; }
    if (!forceContext && lower.includes('missing')) { context = 'missing'; continue; }
    const m = line.match(/^([A-Za-z0-9]{2,4}):\s*(.+)$/);
    if (!m) continue;
    const prefix = m[1].toUpperCase();
    const tokens = m[2].split(',').map(t => t.trim().replace(/\.$/, '')).filter(Boolean);
    for (const tok of tokens){
      let code = null, isDup = false, count = 1;
      const dm = tok.match(/^(\d+)\((\d+)x\)$/i);
      const pm = tok.match(/^(\d+)$/);
      if (dm){
        isDup = true; count = parseInt(dm[2],10);
        code = (prefix==='FWC' && dm[1]==='00') ? 'FWC00' : `${prefix}${parseInt(dm[1],10)}`;
      } else if (pm){
        code = (prefix==='FWC' && pm[1]==='00') ? 'FWC00' : `${prefix}${parseInt(pm[1],10)}`;
      } else { unmatched.push(`${prefix}:${tok}`); continue; }
      if (!MASTER_BY_CODE.has(code)){ unmatched.push(`${code} (unknown)`); continue; }
      if (isDup){ duplicates[code]=(duplicates[code]||0)+count; missing.delete(code); }
      else if (!duplicates[code]) missing.add(code);
    }
  }
  return { missing:[...missing], duplicates, unmatched };
}

// PaniniTrade format parser — handles messy multi-line, split entries, special chars
function parsePaniniTrade(text){
  const TEAM_MAP = { 'INTRO':'FWC', 'GER':'GER', 'ENG':'ENG' };
  const missing = new Set();
  const duplicates = {};
  let isDuplicate = false;
  let currentTeam = null;

  // Pre-process: join wrapped lines
  const rawLines = text.split('\n');
  const lines = [];
  for (const raw of rawLines){
    const t = raw.trim();
    if (!t) continue;
    if (lines.length > 0 && /^[\(\d,\s]/.test(t) && !/^[A-Z]{2,5}/.test(t)){
      lines[lines.length-1] += ', ' + t;
    } else {
      lines.push(t);
    }
  }

  for (let line of lines){
    if (!line) continue;
    if (line.startsWith('http') || line.startsWith('www.')) continue;

    // Check for section switch — may appear mid-line after some data
    // e.g. "NZL: 4, 7, 10, 13          DUPLICATES - 2026 USA MEX CAN:"
    const missingIdx = line.search(/MISSING\s*-/i);
    const dupIdx = line.search(/DUPLICATE[S]?\s*-/i);

    if (dupIdx !== -1){
      // Process any data before the DUPLICATES marker first
      const before = line.slice(0, dupIdx).trim();
      if (before) processPaniniLine(before, isDuplicate, currentTeam, missing, duplicates, TEAM_MAP, ct => currentTeam = ct);
      isDuplicate = true;
      continue;
    }
    if (missingIdx !== -1){
      const before = line.slice(0, missingIdx).trim();
      if (before) processPaniniLine(before, isDuplicate, currentTeam, missing, duplicates, TEAM_MAP, ct => currentTeam = ct);
      isDuplicate = false;
      continue;
    }

    processPaniniLine(line, isDuplicate, currentTeam, missing, duplicates, TEAM_MAP, ct => currentTeam = ct);
  }
  return { missing:[...missing], duplicates, unmatched:[] };
}

function processPaniniLine(line, isDuplicate, currentTeam, missing, duplicates, TEAM_MAP, setTeam){
  if (!line || line.startsWith('http') || line.startsWith('www.')) return;

  // Team line: "KOR :", "AUS**:", "TUR € :", "INTRO:", "CAN"
  const teamLine = line.match(/^([A-Z]{2,5})\s*[^A-Z\d:]*:?\s*(.*)/);
  if (teamLine){
    let rawTeam = teamLine[1];
    let rawNums = teamLine[2].trim();
    let team = TEAM_MAP[rawTeam] || rawTeam;
    if (MASTER_BY_CODE.has(team+'1') || MASTER.some(s=>s.team===team)){
      setTeam(team);
      if (rawNums) extractPaniniNums(rawNums, team, isDuplicate, missing, duplicates);
      return;
    }
  }

  // Orphaned numbers — attach to currentTeam
  if (currentTeam){
    const orphan = line.match(/^:?\s*([\d,\s\(x\)]+)$/i);
    if (orphan) extractPaniniNums(orphan[1], currentTeam, isDuplicate, missing, duplicates);
  }
}

function extractPaniniNums(text, team, isDuplicate, missing, duplicates){
  const tokens = text.split(',').map(t=>t.trim()).filter(Boolean);
  for (const tok of tokens){
    // "10 (x2)" or "10(x2)" or just "10"
    const withCount = tok.match(/(\d+)\s*\(x(\d+)\)/i);
    const justNum = tok.match(/^(\d+)$/);
    if (withCount){
      const code = `${team}${parseInt(withCount[1])}`;
      const count = parseInt(withCount[2]);
      if (!MASTER_BY_CODE.has(code)) continue;
      if (isDuplicate) duplicates[code] = (duplicates[code]||0) + count;
      else missing.add(code);
    } else if (justNum){
      const code = `${team}${parseInt(justNum[1])}`;
      if (!MASTER_BY_CODE.has(code)) continue;
      if (isDuplicate) duplicates[code] = (duplicates[code]||0) + 1;
      else missing.add(code);
    }
  }
}

function buildCollectionMap(missing, duplicates){
  const map = new Map();
  for (const s of MASTER){
    if (duplicates[s.code]) map.set(s.code, {status:'duplicate', count:duplicates[s.code], parallel:'normal'});
    else if (missing.includes(s.code)) map.set(s.code, {status:'missing', count:0, parallel:'normal'});
    else map.set(s.code, {status:'have', count:0, parallel:'normal'});
  }
  return map;
}

async function loadMyCollection(){

  myCollection = new Map();
  (data||[]).forEach(r=>myCollection.set(r.sticker_code, {status:r.status, count:r.duplicate_count, parallel:r.parallel||'normal'}));
}
async function fetchAllRows(table, columns){
  let all = [];
  let from = 0;
  const pageSize = 1000;
  while (true){
    const { data, error } = await sb.from(table).select(columns).range(from, from + pageSize - 1);
    if (error) throw error;
    all = all.concat(data || []);
    if (!data || data.length < pageSize) break;
    from += pageSize;
  }
  return all;
}
async function loadAllMembers(){
  const profiles = await fetchAllRows('profiles', 'id,pseudo');
  const rows = await fetchAllRows('collections', 'user_id,sticker_code,status,duplicate_count,parallel');
  const byUser = new Map();
  (profiles||[]).forEach(p=>byUser.set(p.id, {...p, collection:new Map()}));
  (rows||[]).forEach(r=>{
    const u = byUser.get(r.user_id);
    if (u) u.collection.set(r.sticker_code, {status:r.status, count:r.duplicate_count, parallel:r.parallel||'normal'});
  });
  allMembers = [...byUser.values()];
}
async function saveCollection(missing, duplicates, mode='both'){
  let map;
  if (mode==='both'){
    map = buildCollectionMap(missing, duplicates);
  } else if (mode==='missing-only'){
    map = new Map();
    for (const s of MASTER){
      const existing = myCollection.get(s.code) || {status:'have', count:0, parallel:'normal'};
      if (existing.status==='duplicate') map.set(s.code, existing);
      else if (missing.includes(s.code)) map.set(s.code, {status:'missing', count:0, parallel:'normal'});
      else map.set(s.code, {status:'have', count:0, parallel:'normal'});
    }
  } else { // duplicates-only
    map = new Map();
    for (const s of MASTER){
      const existing = myCollection.get(s.code) || {status:'have', count:0, parallel:'normal'};
      if (duplicates[s.code]) map.set(s.code, {status:'duplicate', count:duplicates[s.code], parallel: existing.status==='duplicate' ? existing.parallel : 'normal'});
      else if (existing.status==='missing') map.set(s.code, existing);
      else map.set(s.code, {status:'have', count:0, parallel:'normal'});
    }
  }
  await sb.from('collections').delete().eq('user_id', profile.id);
  const rows = [];
  for (const [code, v] of map.entries()) rows.push({ user_id:profile.id, sticker_code:code, status:v.status, duplicate_count:v.count, parallel:v.parallel||'normal' });
  for (let i=0;i<rows.length;i+=500){
    const { error } = await sb.from('collections').insert(rows.slice(i,i+500));
    if (error) throw error;
  }
  myCollection = map;
}

async function hashPassword(password, salt){
  const data = new TextEncoder().encode(password + ':' + salt);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hashBuffer)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function randomSalt(){
  return Array.from(crypto.getRandomValues(new Uint8Array(16))).map(b=>b.toString(16).padStart(2,'0')).join('');
}

          ${visibleStickers.map(s=>{
            const v = myCollection.get(s.code) || {status:'have',count:0,parallel:'normal'};
            if (statusFilter==='duplicate'){
              const tagged = v.parallel && v.parallel!=='normal';
              const cardStyle = tagged ? parallelChipStyle(v.parallel) : '';
              const cardHtml = `<div class="cell ${tagged?'':'s-have'}" data-code="${s.code}" data-picker-toggle="${s.code}" style="${cardStyle}cursor:pointer;width:54px;">${v.count>1?`<span class="badge">${v.count}x</span>`:''}${s.code}</div>`;
              const pickerHtml = openParallelPicker===s.code ? editablePicker(s.code, v.parallel||'normal') : '';

            }

          }).join('')}
        </div>
      </div>`;
  }
  holder.innerHTML = html || `<p class="empty-note">${statusFilter!=='all'?'Nothing matches that filter.':`No team matches "${filter}".`}</p>`;
  holder.querySelectorAll('.team-head').forEach(h=>{
    h.onclick = ()=>{ const g = h.dataset.toggle; if (openTeams.has(g)) openTeams.delete(g); else openTeams.add(g); renderGroups(document.getElementById('teamFilter').value.trim().toLowerCase()); };
  });
  holder.querySelectorAll('[data-picker-toggle]').forEach(c=>{
    c.onclick = (ev)=>{
      ev.stopPropagation();
      const code = c.dataset.pickerToggle;
      openParallelPicker = openParallelPicker===code ? null : code;
      renderGroups(document.getElementById('teamFilter').value.trim().toLowerCase());
    };
  });
  holder.querySelectorAll('[data-tag-code]').forEach(d=>{
    d.onclick = async (ev)=>{
      ev.stopPropagation();
      await setStickerParallel(d.dataset.tagCode, d.dataset.tagValue);
      openParallelPicker = null;
      renderGroups(document.getElementById('teamFilter').value.trim().toLowerCase());
    };
  });
}

let selectedTradeMember = null;

const PARALLEL_TAGS = ['normal','blue','red','purple','green','black'];
function parseTradeCode(raw){
  const [code, parallel] = raw.split(':');
  return { code, parallel: parallel || 'normal' };
}
const PARALLEL_CHIP_STYLE = {
  blue:  {bg:'#1C75BC', text:'#fff'},
  red:   {bg:'#E2231A', text:'#fff'},
  purple:{bg:'#8E44AD', text:'#fff'},
  green: {bg:'#2FAE66', text:'#fff'},
  black: {bg:'#1A1A1A', text:'#fff'}
};
function parallelChipStyle(parallel){
  const s = PARALLEL_CHIP_STYLE[parallel];
  if (!s) return '';
  return `background:${s.bg};color:${s.text};`;
}
function editablePicker(code, current){
  return `<div class="parallel-picker">${PARALLEL_TAGS.map(p=>{
    const isActive = current===p;
    const checkColor = p==='normal' ? '#1A1A1A' : '#fff';
    return `<button type="button" class="parallel-rect tag-${p} ${isActive?'active':''}" data-tag-code="${code}" data-tag-value="${p}" title="${p}">${isActive?`<span style="color:${checkColor};font-weight:900;font-size:15px;">✓</span>`:''}</button>`;
  }).join('')}</div>`;
}
function tradeChip(raw, side){
  const { code, parallel } = parseTradeCode(raw);
  return `<span class="sticker ${side}" style="${parallelChipStyle(parallel)}">${code}</span>`;
}

async function renderTradeBuilder(){

  // Fetch active proposals (pending + accepted) for both sides to detect conflicts

    .select('*')
    .in('status', ['pending','accepted'])
    .or(`from_user.eq.${profile.id},from_user.eq.${member.id}`);

  // Cards you've already promised in OTHER active proposals (not this member)
  const myReserved = new Map(); // code -> pseudo of who you promised it to
  // Cards they've already promised to OTHER people (not you)
  const theirReserved = new Map(); // code -> pseudo of who they promised it to

  for (const t of (activeProposals||[])){
    const isFromMe = t.from_user === profile.id;
    const isFromThem = t.from_user === member.id;
    const isToCurrentMember = t.to_user === member.id;
    const isToMe = t.to_user === profile.id;

    if (isFromMe && !isToCurrentMember){
      // My offer codes promised to someone else
      const otherMember = allMembers.find(m=>m.id===t.to_user);
      for (const raw of t.offer_codes){
        const {code} = parseTradeCode(raw);
        myReserved.set(code, otherMember?.pseudo||'someone');
      }
    }
    if (isFromThem && !isToMe){
      // Their offer codes promised to someone else
      const otherMember = allMembers.find(m=>m.id===t.to_user);
      for (const raw of t.offer_codes){
        const {code} = parseTradeCode(raw);
        theirReserved.set(code, otherMember?.pseudo||'someone');
      }
    }
  }

  const groupsWithDups = GROUPS.filter(g=>{
    const teamCodes = MASTER.filter(s=>s.team===g).map(s=>s.code);
    // Only show teams where there's at least one real match in either direction
    const iGiveThemSomething = teamCodes.some(c=>
      (myCollection.get(c)||{}).status==='duplicate' && (member.collection.get(c)||{}).status==='missing');
    const theyGiveMeSomething = teamCodes.some(c=>
      (member.collection.get(c)||{}).status==='duplicate' && (myCollection.get(c)||{}).status==='missing');
    return iGiveThemSomething || theyGiveMeSomething;
  });

    </div>

    ${sentDealsThisSession.length?`
    <div style="background:var(--paper-soft);border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin-bottom:14px;">
      <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:var(--mist);margin-bottom:6px;">Deals sent this session (${sentDealsThisSession.length}) — each is separate</div>
      ${sentDealsThisSession.map((d,i)=>`<div style="font-size:12.5px;margin-bottom:4px;"><strong>Deal ${i+1}:</strong> ${d.give.join(', ')||'nothing'} → ${d.get.join(', ')||'nothing'}</div>`).join('')}
    </div>`:''}
    <div id="tradeGroups" style="max-height:320px;overflow-y:auto;">
      ${groupsWithDups.length===0?'<p class="empty-note">No mutual matches right now — neither of you has a duplicate the other needs.</p>':groupsWithDups.map(g=>{
        const [name] = TEAM_INFO[g];
        const teamCodes = MASTER.filter(s=>s.team===g);
        const mineDups = teamCodes.filter(s=>
          (myCollection.get(s.code)||{}).status==='duplicate' &&
          (member.collection.get(s.code)||{}).status==='missing');
        const theirsDups = teamCodes.filter(s=>
          (member.collection.get(s.code)||{}).status==='duplicate' &&
          (myCollection.get(s.code)||{}).status==='missing');
        return `
        <div class="trade-team-row">
          <div class="trade-team-label">${teamLabel(g)}<span>${name}</span></div>

            const v = myCollection.get(s.code);
            const sel = tradeSelection.give.has(s.code);
            const theyNeed = (member.collection.get(s.code)||{}).status==='missing';
            const reserved = myReserved.get(s.code);
            return `<span class="sticker give trade-chip" data-side="give" data-code="${s.code}" style="cursor:pointer;${parallelChipStyle(v.parallel)}${sel?'outline:2.5px solid var(--ink);':''}">${theyNeed?`<span class="indicator-symbol" style="color:var(--red);font-weight:900;">↓</span> `:''}${reserved?`<span title="Already promised to ${reserved}" class="indicator-symbol" style="color:orange;font-weight:900;">⚠</span> `:''}${s.code}${v.count>1?` (${v.count}x)`:''}</span>`;
          }).join(''):'<span class="empty-note">—</span>'}</div>
          <div class="sticker-chips">${theirsDups.length?theirsDups.map(s=>{
            const v = member.collection.get(s.code);

    <div style="margin-top:16px;">
      <h4>You give${giveList.length?` (${giveList.length})`:''}</h4>
      <div class="sticker-chips">${giveList.length?giveList.map(c=>{
        const v = myCollection.get(c)||{};

      <h4 style="margin-top:10px;">You get${getList.length?` (${getList.length})`:''}</h4>
      <div class="sticker-chips">${getList.length?getList.map(c=>{
        const v = member.collection.get(c)||{};
        return `<span class="sticker get" style="${parallelChipStyle(v.parallel)}">${c}</span>`;
      }).join(''):'<span class="empty-note">none selected</span>'}</div>
    </div>
    <button class="btn full" id="sendProposalBtn" style="margin-top:12px;" ${(giveList.length===0 && getList.length===0)?'disabled':''}>Send trade proposal</button>
    <p class="example" style="margin-top:8px;">Each "Send" creates one separate deal — pick everything for that one trade, send it, then start fresh for a different deal (with this person or anyone else).</p>
    <div id="proposalMsg"></div>`;

  panel.querySelectorAll('.trade-chip').forEach(c=>{
    c.onclick = async ()=>{
      const set = c.dataset.side==='give' ? tradeSelection.give : tradeSelection.get;
      if (set.has(c.dataset.code)) set.delete(c.dataset.code); else set.add(c.dataset.code);
      await renderTradeBuilder();
    };
  });
  const tg = document.getElementById('tradeGroups');
  if (tg) tg.scrollTop = prevScroll;
  const sendBtn = document.getElementById('sendProposalBtn');
  if (sendBtn) sendBtn.onclick = async ()=>{
    sendBtn.disabled = true; sendBtn.textContent = 'Sending…';
    try{
      const offerCodes = giveList.map(c=>{ const v=myCollection.get(c)||{}; return v.parallel && v.parallel!=='normal' ? `${c}:${v.parallel}` : c; });
      const requestCodes = getList.map(c=>{ const v=member.collection.get(c)||{}; return v.parallel && v.parallel!=='normal' ? `${c}:${v.parallel}` : c; });
      await sendTradeProposal(member.id, offerCodes, requestCodes);
      const sentPseudo = member.pseudo;
      sentDealsThisSession.push({ give:[...giveList], get:[...getList] });
      tradeSelection = { give: new Set(), get: new Set() };
      await renderTradeBuilder();
      document.getElementById('proposalMsg').innerHTML = `<div class="msg ok">Deal ${sentDealsThisSession.length} sent to ${sentPseudo} as its own separate proposal — see the log above, and "My Trades" for the full record.</div>`;
      if (selectedTradeMember) renderTradeBoardHistory(selectedTradeMember);
    }catch(e){

/* ============================================================ TRADE PROPOSALS (data + transfer logic) ============================================================ */
let myTrades = [];
async function setStickerParallel(code, parallel){
  await sb.from('collections').update({ parallel, updated_at:new Date().toISOString() }).eq('user_id', profile.id).eq('sticker_code', code);
  const v = myCollection.get(code) || {status:'duplicate', count:1, parallel:'normal'};
  v.parallel = parallel;
  myCollection.set(code, v);
}
async function sendTradeProposal(toUserId, offerCodes, requestCodes){
  const id = crypto.randomUUID();
  const { error } = await sb.from('trade_proposals').insert({
    id, from_user: profile.id, to_user: toUserId, offer_codes: offerCodes, request_codes: requestCodes, status: 'pending'
  });
  if (error) throw error;
}
async function loadMyTrades(){
  const { data } = await sb.from('trade_proposals').select('*').or(`from_user.eq.${profile.id},to_user.eq.${profile.id}`).order('created_at', {ascending:false});
  // Filter out trades the current user has soft-deleted
  myTrades = (data||[]).filter(t=>{
    if (t.from_user === profile.id && t.hidden_from) return false;
    if (t.to_user === profile.id && t.hidden_to) return false;
    return true;
  });
}
// Reduce giver's duplicate count — called on Approve
async function reserveCodes(userId, rawCodes){
  for (const raw of rawCodes){
    const { code } = parseTradeCode(raw);
    const { data: row } = await sb.from('collections').select('*').eq('user_id', userId).eq('sticker_code', code).maybeSingle();
    if (row && row.status==='duplicate'){
      const newCount = row.duplicate_count - 1;
      await sb.from('collections').update({ status: newCount>0?'duplicate':'have', duplicate_count: Math.max(newCount,0), parallel: newCount>0?row.parallel:'normal', updated_at:new Date().toISOString() }).eq('user_id', userId).eq('sticker_code', code);
    }
  }
}
// Restore giver's duplicate count — called on Cancel after Approve
async function unserveCodes(userId, rawCodes){
  for (const raw of rawCodes){
    const { code, parallel } = parseTradeCode(raw);
    const { data: row } = await sb.from('collections').select('*').eq('user_id', userId).eq('sticker_code', code).maybeSingle();
    if (row){
      if (row.status==='have') await sb.from('collections').update({ status:'duplicate', duplicate_count:1, parallel, updated_at:new Date().toISOString() }).eq('user_id', userId).eq('sticker_code', code);
      else if (row.status==='duplicate') await sb.from('collections').update({ duplicate_count:row.duplicate_count+1, updated_at:new Date().toISOString() }).eq('user_id', userId).eq('sticker_code', code);
    }
  }
}
// Give cards to receiver only — giver side already reserved on Approve
async function giveToReceiver(receiverId, rawCodes){
  for (const raw of rawCodes){
    const { code, parallel } = parseTradeCode(raw);
    const { data: receiverRow } = await sb.from('collections').select('*').eq('user_id', receiverId).eq('sticker_code', code).maybeSingle();
    if (receiverRow){
      let newStatus, newCount;
      if (receiverRow.status==='missing'){ newStatus='have'; newCount=0; }
      else if (receiverRow.status==='have'){ newStatus='duplicate'; newCount=1; }
      else { newStatus='duplicate'; newCount=receiverRow.duplicate_count+1; }
      await sb.from('collections').update({ status:newStatus, duplicate_count:newCount, parallel, updated_at:new Date().toISOString() }).eq('user_id', receiverId).eq('sticker_code', code);
    } else {
      await sb.from('collections').insert({ user_id:receiverId, sticker_code:code, status:'have', duplicate_count:0, parallel });
    }
  }
}
async function handleAccept(tradeId){
  const { data: trade } = await sb.from('trade_proposals').select('*').eq('id', tradeId).maybeSingle();
  if (!trade) return;
  await sb.from('trade_proposals').update({ status:'accepted', updated_at:new Date().toISOString() }).eq('id', tradeId);
  // Reserve cards from both sides so they disappear from each person's trade board
  await reserveCodes(trade.from_user, trade.offer_codes);
  await reserveCodes(trade.to_user, trade.request_codes);
  // Remove offered cards from other pending proposals by the same giver
  const offeredCodes = trade.offer_codes.map(r=>parseTradeCode(r).code);
  const { data: otherPending } = await sb.from('trade_proposals').select('*').eq('from_user', trade.from_user).eq('status','pending').neq('id', tradeId);
  for (const other of (otherPending||[])){
    const newOffer = other.offer_codes.filter(r=>!offeredCodes.includes(parseTradeCode(r).code));
    if (newOffer.length===0 && other.request_codes.length===0) await sb.from('trade_proposals').update({ status:'cancelled', updated_at:new Date().toISOString() }).eq('id', other.id);
    else if (newOffer.length!==other.offer_codes.length) await sb.from('trade_proposals').update({ offer_codes:newOffer, updated_at:new Date().toISOString() }).eq('id', other.id);
  }
  await loadMyCollection();
  renderShell();
}
async function handleComplete(tradeId){
  const { data: trade } = await sb.from('trade_proposals').select('*').eq('id', tradeId).maybeSingle();
  if (!trade || trade.status==='completed') return;
  try{
    await sb.from('trade_proposals').update({ status:'completed', updated_at:new Date().toISOString() }).eq('id', tradeId);
    // Giver side already reserved on Approve — only give to receivers now
    await giveToReceiver(trade.to_user, trade.offer_codes);
    await giveToReceiver(trade.from_user, trade.request_codes);
    await loadMyCollection();
    currentTab = 'trades';
    renderShell();
  }catch(e){ alert('Trade failed: '+e.message); }
}
async function handleRespond(tradeId, newStatus){
  // If cancelling an approved trade, restore both sides' reserved cards
  if (newStatus==='cancelled'){
    const { data: trade } = await sb.from('trade_proposals').select('*').eq('id', tradeId).maybeSingle();
    if (trade && trade.status==='accepted'){
      await unserveCodes(trade.from_user, trade.offer_codes);
      await unserveCodes(trade.to_user, trade.request_codes);
    }
  }
  await sb.from('trade_proposals').update({ status:newStatus, updated_at:new Date().toISOString() }).eq('id', tradeId);
  await loadMyCollection();
  renderShell();
}

/* ============================================================ MOST WANTED ============================================================ */
async function renderWanted(main){
  main.innerHTML = `<div class="help-box"><h3>🔥 How Most Wanted works</h3><ul><li><strong>Your Most Wanted</strong> — your duplicates ranked by how many people need them. Click Trade → to go straight there.</li><li><strong>Most Wanted</strong> — stickers the most people are missing — with who has them.</li></ul></div><div class="panel"><h2>Most Wanted</h2><div class="loading">Crunching the numbers…</div></div>`;
  await loadAllMembers();

  // Build demand map: code -> list of members missing it (excluding yourself)
  const demand = new Map();
  for (const m of allMembers){
    if (m.id === profile.id) continue;
    for (const [code, v] of m.collection.entries()){
      if (v.status === 'missing'){
        if (!demand.has(code)) demand.set(code, []);
        demand.get(code).push(m);
      }
    }
  }

  // Section 1: YOUR duplicates ranked by demand
  const myRows = [];
  for (const [code, v] of myCollection.entries()){
    if (v.status !== 'duplicate') continue;
    const neededBy = demand.get(code) || [];
    if (neededBy.length === 0) continue;
    myRows.push({ code, parallel: v.parallel||'normal', count: v.count, neededBy });
  }
  myRows.sort((a,b) => b.neededBy.length - a.neededBy.length || Math.random()-0.5);

  // Section 2: Office-wide most missing (all members, any code)
  const activeMembers = allMembers.filter(m=>m.collection.size>0).length;

  // Build "who has it" map for general section: code -> members with that duplicate
  const whoHasIt = new Map();
  for (const m of allMembers){
    for (const [code, v] of m.collection.entries()){
      if (v.status === 'duplicate'){
        if (!whoHasIt.has(code)) whoHasIt.set(code, []);
        whoHasIt.get(code).push(m);
      }
    }
  }
  const generalRows = [...demand.entries()]
    .map(([code, members])=>({ code, count: members.length, holders: whoHasIt.get(code)||[] }))
    .sort((a,b)=> b.count - a.count || Math.random()-0.5)
    .slice(0, 15);

  document.getElementById('main').innerHTML = `
    <div class="help-box"><h3>🔥 How Most Wanted works</h3><ul><li><strong>Your Most Wanted</strong> — your duplicates ranked by how many people need them, with Trade → buttons.</li><li><strong>Most Wanted</strong> — stickers the most people are missing, with who has them available.</li></ul></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start;">
      <div class="panel">
        <h2>🎯 Your Most Wanted</h2>
        <p class="lead">Your duplicates people need most.</p>
        ${myRows.length===0?'<p class="empty-note">None of your duplicates are needed right now.</p>':
        myRows.map(r=>`
          <div style="border:1px solid var(--line);border-radius:8px;padding:12px;margin-bottom:8px;">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;">
              <span class="sticker give" style="${parallelChipStyle(r.parallel)}">${r.code}${r.count>1?` (${r.count}x)`:''}</span>
              <span class="count">${r.neededBy.length} need it</span>
            </div>
            <div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:6px;">
              ${r.neededBy.map(m=>`<button class="btn ghost" style="padding:4px 10px;font-size:12px;" data-wanted-member="${m.id}">${m.pseudo} →</button>`).join('')}
            </div>
          </div>`).join('')}
      </div>
      <div class="panel">
        <h2>🌍 Most Wanted</h2>
        <p class="lead">Most missing — who can supply them.</p>
        ${generalRows.length===0?'<p class="empty-note">Not enough data yet.</p>':
        generalRows.map(r=>`
          <div style="border:1px solid var(--line);border-radius:8px;padding:12px;margin-bottom:8px;${r.holders.some(m=>m.id===profile.id)?'background:linear-gradient(135deg,#FFF9B0,var(--yellow) 80%);border-color:var(--yellow-deep);':''}">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
              <span class="sticker" style="border:1.5px solid var(--ink);font-size:12px;">${r.code}</span>
              <span class="count">${r.count} need it</span>
            </div>
            ${r.holders.length?`<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:6px;">
              ${r.holders.map(m=>`<button class="btn ghost" style="padding:4px 10px;font-size:12px;${m.id===profile.id?'background:var(--yellow);border-color:var(--yellow-deep);':''}" data-wanted-member="${m.id}">${m.id===profile.id?'You →':m.pseudo+' →'}</button>`).join('')}
            </div>`:'<p class="empty-note" style="margin:6px 0 0;font-size:12px;">No one has a spare yet.</p>'}
          </div>`).join('')}
      </div>
    </div>`;

  document.querySelectorAll('[data-wanted-member]').forEach(btn=>{
    btn.onclick = ()=>{
      const member = allMembers.find(m=>m.id===btn.dataset.wantedMember);
      if (!member) return;
      selectedTradeMember = member;
      tradeSelection = { give: new Set(), get: new Set() };
      sentDealsThisSession = [];
      currentTab = 'trade';
      renderShell();
      setTimeout(async ()=>{
        const builderPanel = document.getElementById('builderPanel');
        if (builderPanel){ await renderTradeBuilder(); builderPanel.scrollIntoView({behavior:'smooth', block:'start'}); }
      }, 100);
    };
  });
}

/* ============================================================ MEMBERS ============================================================ */
async function renderMembers(main){
  main.innerHTML = `<div class="help-box"><h3>👥 How Members works</h3><ul><li><strong>Complete %</strong> — how much of the full 994-sticker album each person has</li><li><strong>Duplicates</strong> — total spare copies available to trade</li><li>🥇🥈🥉 medals go to the top 3 in each category</li></ul></div><div class="panel"><h2>Members</h2><div class="loading">Loading…</div></div>`;
  await loadAllMembers();
  const rows = allMembers.map(m=>{
    let have=0,dup=0;
    for (const v of m.collection.values()){ if (v.status==='have') have++; else if (v.status==='duplicate'){have++;dup+=v.count||1;} }
    const pct = m.collection.size? Math.round(100*have/MASTER.length) : 0;
    return {pseudo:m.pseudo, pct, dup, isMe:m.id===profile.id};
  }).sort((a,b)=>b.pct-a.pct);

  const dupRanked = [...rows].sort((a,b)=>b.dup-a.dup);

  const rankIcon = (i, val) => {
    if (val === 0) return '';
    if (i === 0) return '🏆';
    if (i === 1) return '🥈';
    if (i === 2) return '🥉';
    return `${i+1}.`;
  };

  document.getElementById('main').innerHTML = `
    <div class="help-box"><h3>👥 How Members works</h3><ul><li><strong>Complete %</strong> — how much of the full 994-sticker album each person has</li><li><strong>Duplicates</strong> — total spare copies available to trade</li><li>🏆🥈🥉 for top 3, numbers for the rest</li></ul></div>
    <div class="panel">
      <h2>Members (${rows.length})</h2>
      <table class="members-table">
        <thead><tr><th style="width:40px;text-align:center;">#</th><th>Name</th><th>Complete</th><th style="text-align:right;">Duplicates</th><th style="width:40px;text-align:center;">#</th></tr></thead>
        <tbody>${rows.map((r,i)=>{
          const dupIdx = dupRanked.findIndex(d=>d.pseudo===r.pseudo);
          return `
          <tr style="${r.isMe?'background:var(--blue-soft);font-weight:700;':''}">
            <td style="text-align:center;font-size:${i<3?'20px':'14px'};font-weight:700;color:var(--mist);">${rankIcon(i, r.pct)}</td>
            <td>${r.pseudo}${r.isMe?' (you)':''}</td>
            <td class="mono">${r.pct}%</td>
            <td class="mono" style="text-align:right;">${r.dup}</td>
            <td style="text-align:center;font-size:${dupIdx<3?'20px':'14px'};font-weight:700;color:var(--mist);">${rankIcon(dupIdx, r.dup)}</td>
          </tr>`;
        }).join('')}
        </tbody>
      </table>
    </div>`;
}

init();
